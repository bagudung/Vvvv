name: Build VMProtectUnpacker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Capstone from source
        shell: powershell
        run: |
          git clone --depth=1 --branch 5.0.9 https://github.com/capstone-engine/capstone.git C:\capstone-src
          cmake -S C:\capstone-src -B C:\capstone-build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="C:\Program Files\capstone" `
            -DCAPSTONE_BUILD_SHARED=OFF `
            -DCAPSTONE_BUILD_TESTS=OFF `
            -DCAPSTONE_BUILD_CSTOOL=OFF
          cmake --build C:\capstone-build --config Release
          cmake --install C:\capstone-build --config Release

      - name: Verify Capstone installed
        shell: powershell
        run: |
          Get-ChildItem "C:\Program Files\capstone" -Recurse | Select-Object FullName

      - name: Configure CMake
        shell: cmd
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: cmd
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VMProtectUnpacker
          path: build/Release/VMProtectUnpacker.exe
