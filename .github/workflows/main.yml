name: Build VMProtectUnpacker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Capstone pre-built
        run: |
          curl -L -o capstone.zip https://github.com/capstone-engine/capstone/releases/download/5.0.3/capstone-5.0.3-win64.zip
          Expand-Archive -Path capstone.zip -DestinationPath C:\capstone-extracted -Force
          Get-ChildItem C:\capstone-extracted -Recurse | Select-Object FullName
        shell: powershell

      - name: Setup Capstone paths
        run: |
          $src = Get-ChildItem C:\capstone-extracted -Recurse -Directory | Select-Object -First 1
          Write-Host "Found: $($src.FullName)"
          New-Item -ItemType Directory -Force -Path "C:\Program Files\capstone\include"
          New-Item -ItemType Directory -Force -Path "C:\Program Files\capstone\lib"
          Copy-Item -Recurse -Force "$($src.FullName)\include\*" "C:\Program Files\capstone\include\"
          Copy-Item -Force "$($src.FullName)\capstone.lib" "C:\Program Files\capstone\lib\capstone.lib"
          Get-ChildItem "C:\Program Files\capstone" -Recurse | Select-Object FullName
        shell: powershell

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        shell: cmd

      - name: Build
        run: cmake --build build --config Release
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VMProtectUnpacker
          path: build/Release/VMProtectUnpacker.exe
