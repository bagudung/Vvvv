name: Build VMProtectUnpacker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Capstone via vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:/vcpkg
          C:/vcpkg/bootstrap-vcpkg.bat
          C:/vcpkg/vcpkg.exe install capstone:x64-windows
        shell: cmd

      - name: Copy Capstone to expected path
        run: |
          mkdir "C:\Program Files\capstone\include" -ErrorAction SilentlyContinue
          mkdir "C:\Program Files\capstone\lib" -ErrorAction SilentlyContinue
          xcopy /E /Y "C:\vcpkg\installed\x64-windows\include\capstone" "C:\Program Files\capstone\include\capstone\"
          xcopy /Y "C:\vcpkg\installed\x64-windows\lib\capstone.lib" "C:\Program Files\capstone\lib\"
        shell: powershell

      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        shell: cmd

      - name: Build
        run: cmake --build build --config Release
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VMProtectUnpacker
          path: build/Release/VMProtectUnpacker.exe
